---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gatus.io
  resources:
  - endpoints
  - instances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gatus.io
  resources:
  - endpoints/finalizers
  - instances/finalizers
  verbs:
  - update
- apiGroups:
  - gatus.io
  resources:
  - endpoints/status
  - instances/status
  verbs:
  - get
  - patch
  - update
