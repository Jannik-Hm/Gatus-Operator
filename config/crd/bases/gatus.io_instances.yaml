---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: instances.gatus.io
spec:
  group: gatus.io
  names:
    kind: Instance
    listKind: InstanceList
    plural: instances
    singular: instance
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Instance is the Schema for the instances API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Instance
            properties:
              gatus-config:
                description: Global Gatus config
                properties:
                  alerting:
                    description: Alerting Configuration (see https://github.com/TwiN/gatus/tree/master#alerting)
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  concurrency:
                    description: |-
                      Maximum number of endpoints/suites to monitor concurrently
                      Set to 0 for unlimited (see https://github.com/TwiN/gatus/tree/master#concurrency)
                    format: int32
                    type: integer
                  connectivity:
                    description: |-
                      Connectivity Configuration (see https://github.com/TwiN/gatus/tree/master#connectivity)
                      Used to check wether the connection of Gatus itself is broken
                      All endpoint executions are skipped while the connectivity checker deems connectivity to be down
                    properties:
                      checker:
                        properties:
                          interval:
                            type: string
                          target:
                            type: string
                        required:
                        - target
                        type: object
                    required:
                    - checker
                    type: object
                  maintenance:
                    description: Maintenance Configuration (see https://github.com/TwiN/gatus/tree/master#maintenance)
                    properties:
                      duration:
                        type: string
                      enabled:
                        type: boolean
                      every:
                        items:
                          type: string
                        type: array
                      start:
                        type: string
                      timezone:
                        type: string
                    required:
                    - duration
                    - start
                    type: object
                  metrics:
                    description: Whether to expose metrics at /metrics.
                    type: boolean
                  security:
                    description: |-
                      Security Configuration (see https://github.com/TwiN/gatus/tree/master#security)
                      Note: there will be changes to simplify secret refs
                    properties:
                      basic:
                        properties:
                          password-bcrypt-base64:
                            type: string
                          username:
                            type: string
                        required:
                        - password-bcrypt-base64
                        - username
                        type: object
                      oidc:
                        properties:
                          allowed-subjects:
                            items:
                              type: string
                            type: array
                          client-id:
                            type: string
                          client-secret:
                            type: string
                          issuer-url:
                            type: string
                          redirect-url:
                            type: string
                          scopes:
                            items:
                              type: string
                            type: array
                          session-ttl:
                            type: string
                        required:
                        - client-id
                        - client-secret
                        - issuer-url
                        - redirect-url
                        type: object
                    type: object
                  storage:
                    description: |-
                      Storage Configuration (see https://github.com/TwiN/gatus/tree/master#storage)
                      default is Memory, this is not container restart persistent
                      since config changes result in a rolling deployment change, that will clear all history
                      to persist either use sqlite or postgres
                    properties:
                      caching:
                        type: boolean
                      maximum-number-of-events:
                        format: int32
                        type: integer
                      maximum-number-of-results:
                        format: int32
                        type: integer
                      path:
                        type: string
                      type:
                        type: string
                    type: object
                  ui:
                    description: UI Configuration (see https://github.com/TwiN/gatus/tree/master#ui)
                    properties:
                      buttons:
                        items:
                          properties:
                            link:
                              type: string
                            name:
                              type: string
                          required:
                          - link
                          - name
                          type: object
                        type: array
                      custom-css:
                        type: string
                      dark-mode:
                        type: boolean
                      dashboard-heading:
                        type: string
                      dashboard-subheading:
                        type: string
                      default-filter-by:
                        type: string
                      default-sort-by:
                        type: string
                      description:
                        type: string
                      header:
                        type: string
                      link:
                        type: string
                      login-subtitle:
                        type: string
                      logo:
                        type: string
                      title:
                        type: string
                    type: object
                  web:
                    description: |-
                      Web Configuration
                      If you experience `431 Request Header Fields Too Large error`, increase this value (default is 8192, as of 2026-04-10)
                    properties:
                      read-buffer-size:
                        format: int32
                        type: integer
                    type: object
                type: object
              image:
                description: Image to be used
                pattern: ^([\w\.\-\/]+)(:[\w\.\-]+)?(@sha256:[a-fA-F0-0]{64})?$
                type: string
              name:
                description: Name of the Gatus Instance (should be unique) and is
                  used for reference when e.g. creating announcements, monitors, etc.
                type: string
              replicas:
                default: 1
                description: Number of Gatus Instance Replicas, defaults to 1
                format: int32
                minimum: 0
                type: integer
              service:
                description: Service Config, if omitted, no service will be created
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Additional Service Annotations
                    type: object
                  enable:
                    default: true
                    description: Enable service generation (only required when all
                      other service settings are omitted)
                    type: boolean
                  ipFamilies:
                    description: IP Families of the service
                    items:
                      description: |-
                        IPFamily represents the IP Family (IPv4 or IPv6). This type is used
                        to express the family of an IP expressed by a type (e.g. service.spec.ipFamilies).
                      type: string
                    type: array
                  ipFamilyPolicy:
                    description: IPFamilyPolicy of the service
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Additional Service Labels
                    type: object
                  type:
                    default: ClusterIP
                    description: Type of the service
                    type: string
                required:
                - enable
                - type
                type: object
              serviceName:
                description: Name of the Service created, defaults to instance name
                type: string
            required:
            - name
            type: object
          status:
            description: status defines the observed state of Instance
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the Instance resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deploymentName:
                description: Corresponding Deployment Name
                type: string
              replicas:
                default: 0
                description: Current Replicas
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
