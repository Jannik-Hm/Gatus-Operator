                            - duration
                            - start
                            type: object
                          type: array
                        method:
                          type: string
                        name:
                          type: string
                        ssh:
                          properties:
                            password:
                              type: string
                            username:
                              type: string
                          required:
                          - password
                          - username
                          type: object
                        store:
                          additionalProperties:
                            type: string
                          description: Map of values to extract from the response
