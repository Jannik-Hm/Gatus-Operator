---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: suites.gatus.io
spec:
  group: gatus.io
  names:
    kind: Suite
    listKind: SuiteList
    plural: suites
    singular: suite
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Suite is the Schema for the suites API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Suite
            properties:
              config:
                properties:
                  context:
                    additionalProperties:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    description: Initial context values that can be referenced by
                      endpoints. (see https://github.com/TwiN/gatus/tree/master#using-context-in-endpoints)
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  enabled:
                    description: |-
                      Whether to monitor the suite.
                      Defaults to true
                    type: boolean
                  endpoints:
                    description: List of endpoints to execute sequentially.
                    items:
                      properties:
                        alerts:
                          items:
                            properties:
                              description:
                                type: string
                              enabled:
                                type: boolean
                              failure-threshold:
                                format: int32
                                type: integer
                              minimum-reminder-interval:
                                type: string
                              provider-override:
                                additionalProperties:
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                                type: object
                                x-kubernetes-preserve-unknown-fields: true
                              send-on-resolved:
                                type: boolean
                              success-threshold:
                                format: int32
                                type: integer
                              type:
                                type: string
                            required:
                            - type
                            type: object
                          type: array
                        always-run:
                          description: Whether to execute this endpoint even if previous
                            endpoints in the suite failed.
                          type: boolean
                        body:
                          type: string
                        client:
                          properties:
                            dns-resolver:
                              type: string
                            identity-aware-proxy:
                              properties:
                                audience:
                                  type: string
                              required:
                              - audience
                              type: object
                            ignore-redirect:
                              type: boolean
                            insecure:
                              type: boolean
                            network:
                              type: string
                            oauth2:
                              properties:
                                client-id:
                                  type: string
                                client-secret:
                                  type: string
                                scopes:
                                  items:
                                    type: string
                                  type: array
                                token-url:
                                  type: string
                              required:
                              - client-id
                              - client-secret
                              - scopes
                              - token-url
                              type: object
                            proxy-url:
                              type: string
                            timeout:
                              type: string
                            tls:
                              properties:
                                certificate-file:
                                  type: string
                                private-key-file:
                                  type: string
                                renegotiation:
                                  type: string
                              type: object
                          type: object
                        conditions:
                          items:
                            type: string
                          type: array
                        dns:
                          properties:
                            query-name:
                              type: string
                            query-type:
                              type: string
                          type: object
                        enabled:
                          type: boolean
                        extra-labels:
                          additionalProperties:
                            type: string
                          type: object
                        graphql:
                          type: boolean
                        group:
                          type: string
                        headers:
                          additionalProperties:
                            type: string
                          type: object
                        interval:
                          type: string
                        maintenance-windows:
