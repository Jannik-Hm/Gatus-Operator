                          type: object
                        ui:
                          properties:
                            badge:
                              properties:
                                response-time:
                                  properties:
                                    thresholds:
                                      items:
                                        format: int32
                                        type: integer
                                      type: array
                                  type: object
                              type: object
                            dont-resolve-failed-conditions:
                              type: boolean
                            hide-conditions:
                              type: boolean
                            hide-errors:
                              type: boolean
                            hide-hostname:
                              type: boolean
                            hide-port:
                              type: boolean
                            hide-url:
                              type: boolean
                            resolve-successful-conditions:
                              type: boolean
                          type: object
                        url:
                          type: string
                      required:
                      - conditions
                      - name
                      - url
                      type: object
                    type: array
                  group:
                    description: |-
                      Group name.
                      Used to group multiple suites together on the dashboard.
                    type: string
                  interval:
                    description: Duration to wait between suite executions.
                    type: string
                  name:
                    description: |-
                      Name of the suite.
                      Must be unique.
                    type: string
                  timeout:
                    description: Maximum duration for the entire suite execution.
                    type: string
