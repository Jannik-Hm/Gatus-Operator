apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
spec:
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - image:  nginx:alpine-slim
        name:  test-app
        ports:
        - containerPort:  80
          name:  http
---
kind: Service
apiVersion: v1
metadata:
  name:  test-service
spec:
  selector:
    app:  test-app
  type:  ClusterIP
  ports:
  - name:  http
    port:  80
    targetPort:  80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-ingress
  annotations:
    "gatus.io/instances": "instance-sample"
    "gatus.io/name": "test-ingress"
spec:
  rules:
  - host: test2.com
    http:
      paths:
      - pathType: Prefix
        path: /
        backend:
          service:
            name: test-service
            port:
              number: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: prod-web
  annotations:
    "gatus.io/group": "Prod"
spec:
  gatewayClassName: cloud-provider-kind
  listeners:
  - protocol: HTTP
    port: 80
    name: prod-web-gw
    allowedRoutes:
      namespaces:
        from: Same
  - protocol: HTTPS
    port: 443
    name: prod-web-gw-https
    allowedRoutes:
      namespaces:
        from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-route
  annotations:
    "gatus.io/instances": "instance-sample"
    "gatus.io/group": "Test"
spec:
  parentRefs:
  - name: prod-web
  hostnames:
    - "test.com"
  rules:
  - backendRefs:
    - name: test-service
      port: 80